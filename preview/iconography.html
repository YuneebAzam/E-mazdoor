<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; min-height: 150px; }
  .label { font-family: var(--font-body); font-size: 11px; color: var(--ink-60); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; margin-bottom: 12px;}
  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px;}
  .ic svg { stroke-width: 1.75; color: var(--ink); width: 22px; height: 22px;}
  .ic span { font-family: var(--font-mono); font-size: 9px; color: var(--ink-60);}
</style></head>
<body>
  <div class="label">Lucide · 1.75 stroke · ink · 24px default</div>
  <div class="grid">
    <div class="ic"><i data-lucide="wrench"></i><span>wrench</span></div>
    <div class="ic"><i data-lucide="plug-zap"></i><span>plug-zap</span></div>
    <div class="ic"><i data-lucide="hammer"></i><span>hammer</span></div>
    <div class="ic"><i data-lucide="paint-roller"></i><span>paint-r</span></div>
    <div class="ic"><i data-lucide="air-vent"></i><span>air-vent</span></div>
    <div class="ic"><i data-lucide="hard-hat"></i><span>hard-hat</span></div>
    <div class="ic"><i data-lucide="home"></i><span>home</span></div>
    <div class="ic"><i data-lucide="calendar-clock"></i><span>cal-clk</span></div>
    <div class="ic"><i data-lucide="map-pin"></i><span>map-pin</span></div>
    <div class="ic"><i data-lucide="star"></i><span>star</span></div>
    <div class="ic"><i data-lucide="phone"></i><span>phone</span></div>
    <div class="ic"><i data-lucide="credit-card"></i><span>card</span></div>
    <div class="ic"><i data-lucide="banknote"></i><span>cash</span></div>
    <div class="ic"><i data-lucide="shield-check"></i><span>shield</span></div>
    <div class="ic"><i data-lucide="message-circle"></i><span>chat</span></div>
    <div class="ic"><i data-lucide="user"></i><span>user</span></div>
    <div class="ic"><i data-lucide="search"></i><span>search</span></div>
    <div class="ic"><i data-lucide="clock"></i><span>clock</span></div>
    <div class="ic"><i data-lucide="check"></i><span>check</span></div>
    <div class="ic"><i data-lucide="x"></i><span>x</span></div>
    <div class="ic"><i data-lucide="chevron-right"></i><span>chev-r</span></div>
    <div class="ic"><i data-lucide="bell"></i><span>bell</span></div>
    <div class="ic"><i data-lucide="filter"></i><span>filter</span></div>
    <div class="ic"><i data-lucide="settings"></i><span>settings</span></div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
