<!doctype html>
<html><head><meta charset="utf-8"><title>Worker card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--kraft); min-height: 150px; display: flex; gap: 14px; }
  .card { flex: 1; background: #fff; border: 1px solid var(--ink-10); border-radius: 12px; box-shadow: var(--shadow-sm); display: flex; padding: 14px; gap: 12px; position: relative; overflow: hidden;}
  .stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .available { background: var(--brand-orange); }
  .busy { background: var(--slate-400); }
  .avatar { width: 56px; height: 56px; border-radius: 999px; background: var(--ink); color: var(--kraft); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 22px; flex: none; }
  .meta { flex: 1; min-width: 0; }
  .name { font-family: var(--font-body); font-weight: 600; font-size: 15px; color: var(--ink); }
  .trade { font-family: var(--font-body); font-size: 13px; color: var(--ink-60); margin-top: 1px;}
  .row { display: flex; align-items: center; gap: 12px; margin-top: 6px; font-family: var(--font-body); font-size: 12px; color: var(--ink-80);}
  .star { color: var(--warn);}
  .price { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--ink); align-self: flex-start; font-variant-numeric: tabular-nums;}
  .rs { font-size: 11px; color: var(--ink-60); margin-right: 2px;}
  .badge { font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); background: var(--success-tint); padding: 2px 6px; border-radius: 3px; margin-left: 4px;}
  .busy-tag { color: var(--slate-500); font-style: italic;}
</style></head>
<body>
  <div class="card">
    <div class="stripe available"></div>
    <div class="avatar">IK</div>
    <div class="meta">
      <div class="name">Imran K. <span class="badge">Verified</span></div>
      <div class="trade">Plumber · 4 yrs</div>
      <div class="row"><span class="star">★ 4.8</span><span>· 2.4 km</span><span>· available now</span></div>
    </div>
    <div class="price"><span class="rs">Rs</span>800</div>
  </div>
  <div class="card">
    <div class="stripe busy"></div>
    <div class="avatar" style="background: var(--slate-400);">RA</div>
    <div class="meta">
      <div class="name">Rashid A.</div>
      <div class="trade">Electrician · 7 yrs</div>
      <div class="row"><span class="star">★ 4.9</span><span>· 1.1 km</span><span class="busy-tag">· back at 5 pm</span></div>
    </div>
    <div class="price"><span class="rs">Rs</span>1,200</div>
  </div>
</body></html>
