<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; min-height: 150px; display: flex; gap: 20px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .field label { font-family: var(--font-body); font-weight: 500; font-size: 12px; color: var(--ink-80); display: block; margin-bottom: 5px; }
  .input { font-family: var(--font-body); font-size: 14px; color: var(--ink); padding: 10px 12px; border: 1px solid var(--slate-300); border-radius: 8px; background: #fff; width: 100%; outline: none;}
  .input::placeholder { color: var(--ink-40); }
  .input.focused { border-color: var(--ink); box-shadow: 0 0 0 3px var(--ink-10); }
  .input.error { border-color: var(--danger); }
  .err { font-family: var(--font-body); font-size: 12px; color: var(--danger); margin-top: 4px; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap;}
  .chip { font-family: var(--font-body); font-weight: 500; font-size: 13px; padding: 6px 12px; border: 1px solid var(--ink-20); border-radius: 999px; background: #fff; color: var(--ink); cursor: pointer;}
  .chip.on { background: var(--ink); color: var(--kraft); border-color: var(--ink);}
</style></head>
<body>
  <div class="col">
    <div class="field"><label>Your address</label><input class="input" value="Block 4, Gulshan-e-Iqbal"></div>
    <div class="field"><label>Phone</label><input class="input focused" value="+92 333 1234567"></div>
    <div class="field"><label>Phone</label><input class="input error" value=""><div class="err">Enter a valid number</div></div>
  </div>
  <div class="col">
    <div class="field"><label>Choose service</label>
      <div class="chip-row"><span class="chip on">Plumber</span><span class="chip">Electrician</span><span class="chip">Carpenter</span><span class="chip">Painter</span></div>
    </div>
    <div class="field"><label>Time slot</label>
      <div class="chip-row"><span class="chip">Now</span><span class="chip on">Today 4 pm</span><span class="chip">Tomorrow</span></div>
    </div>
  </div>
</body></html>
