<!doctype html>
<html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 24px; background: #fff; min-height: 150px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--ink-10); }
  .row:last-child { border-bottom: none; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--ink-60); width: 60px; flex: none;}
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--ink-40); width: 40px; flex: none;}
  .sample { color: var(--ink); }
  .h1 { font-family: var(--font-display); font-weight: 700; font-size: 32px; line-height: 1; }
  .h2 { font-family: var(--font-display); font-weight: 700; font-size: 24px; line-height: 1; }
  .h3 { font-family: var(--font-display); font-weight: 600; font-size: 20px; line-height: 1; }
  .body { font-family: var(--font-body); font-weight: 400; font-size: 15px; }
  .small { font-family: var(--font-body); font-size: 13px; color: var(--ink-80); }
  .cap { font-family: var(--font-body); font-weight: 600; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-60); }
</style></head>
<body>
  <div class="row"><span class="name">cap</span><span class="px">11</span><span class="sample cap">Eyebrow label</span></div>
  <div class="row"><span class="name">small</span><span class="px">13</span><span class="sample small">Caption / metadata</span></div>
  <div class="row"><span class="name">body</span><span class="px">15</span><span class="sample body">Body paragraph copy</span></div>
  <div class="row"><span class="name">h3</span><span class="px">20</span><span class="sample h3">Section title</span></div>
  <div class="row"><span class="name">h2</span><span class="px">24</span><span class="sample h2">Screen title</span></div>
  <div class="row"><span class="name">h1</span><span class="px">32</span><span class="sample h1">Hero headline</span></div>
</body></html>
