<!doctype html>
<html><head><meta charset="utf-8"><title>Mono & price</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; min-height: 150px; display: flex; gap: 24px; align-items: center; }
  .col { flex: 1; }
  .label { font-family: var(--font-body); font-size: 11px; color: var(--ink-60); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;}
  .price { font-family: var(--font-display); font-weight: 700; font-size: 56px; line-height: 1; letter-spacing: -0.01em; color: var(--ink); font-variant-numeric: tabular-nums;}
  .price .rs { font-size: 24px; vertical-align: 12px; color: var(--ink-60); margin-right: 6px;}
  .price .range { font-size: 32px; color: var(--ink-60); }
  .mono { font-family: var(--font-mono); font-size: 14px; color: var(--ink); line-height: 1.7; }
  .mono .k { color: var(--ink-60); }
</style></head>
<body>
  <div class="col">
    <div class="label">Price</div>
    <div class="price"><span class="rs">Rs</span>1,200</div>
  </div>
  <div class="col">
    <div class="label">Mono — JetBrains Mono</div>
    <div class="mono">
      <span class="k">id&nbsp;&nbsp;&nbsp;&nbsp;</span>EM-21458<br>
      <span class="k">eta&nbsp;&nbsp;&nbsp;</span>25 min<br>
      <span class="k">paid&nbsp;&nbsp;</span>cod
    </div>
  </div>
</body></html>
