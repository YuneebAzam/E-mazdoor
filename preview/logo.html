<!doctype html>
<html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--kraft); display: flex; align-items: center; gap: 32px; min-height: 150px; }
  .lockup { display: flex; align-items: center; gap: 20px; }
  .mark { width: 64px; height: 64px; }
  .word { font-family: var(--font-display); font-weight: 700; font-size: 36px; color: var(--ink); letter-spacing: -0.5px; line-height: 1; }
  .tag { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 2px; color: var(--brand-orange); margin-top: 4px; text-transform: uppercase; }
  .divider { width: 1px; height: 64px; background: var(--ink-10); }
  .swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .chip { width: 36px; height: 36px; border-radius: 6px; border: 1px solid var(--ink-10); }
  .chip-orange { background: var(--brand-orange); }
  .chip-ink { background: var(--ink); }
  .chip-kraft { background: var(--kraft); border-color: var(--ink-20); }
  .label { font-family: var(--font-body); font-size: 10px; color: var(--ink-60); letter-spacing: 0.04em; text-transform: uppercase; }
</style></head>
<body>
  <div class="lockup">
    <img class="mark" src="../assets/logo-mark.svg" alt="">
    <div>
      <div class="word">E-MAZDOOR</div>
      <div class="tag">Skilled hands · on call</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="swatch"><div class="chip chip-orange"></div><div class="label">Orange</div></div>
  <div class="swatch"><div class="chip chip-ink"></div><div class="label">Ink</div></div>
  <div class="swatch"><div class="chip chip-kraft"></div><div class="label">Kraft</div></div>
</body></html>
