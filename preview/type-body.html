<!doctype html>
<html><head><meta charset="utf-8"><title>Body type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; min-height: 150px; }
  .label { font-family: var(--font-body); font-size: 11px; color: var(--ink-60); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;}
  p { margin: 0 0 4px; }
  .lg { font-family: var(--font-body); font-weight: 400; font-size: 17px; line-height: 1.6; color: var(--ink); }
  .md { font-family: var(--font-body); font-weight: 400; font-size: 15px; line-height: 1.45; color: var(--ink); }
  .sm { font-family: var(--font-body); font-weight: 400; font-size: 13px; line-height: 1.45; color: var(--ink-80); }
  .cap { font-family: var(--font-body); font-weight: 500; font-size: 12px; color: var(--ink-60); }
</style></head>
<body>
  <div class="label">Body — Inter</div>
  <p class="lg">Imran arrives in about 25 min.</p>
  <p class="md">Pay Rs 800 in cash when the job is done. You can rate your mistri after.</p>
  <p class="sm">Booking #EM-21458 · created 3:30 pm today</p>
  <p class="cap">VERIFIED · 4 years on platform</p>
</body></html>
