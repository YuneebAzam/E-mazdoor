<!doctype html>
<html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; display: flex; gap: 16px; min-height: 150px; align-items: stretch; }
  .col { flex: 1; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; border: 1px solid var(--ink-10); }
  .swatch { flex: 1; min-height: 64px; display: flex; align-items: flex-end; padding: 10px 12px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
  .meta { padding: 8px 12px; background: #fff; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink); }
  .role { font-family: var(--font-body); font-size: 10px; color: var(--ink-60); margin-top: 2px; }
  .on-light { color: var(--ink); }
  .on-dark { color: var(--kraft); }
</style></head>
<body>
  <div class="col">
    <div class="swatch" style="background: var(--brand-orange)"><div class="name on-dark">Hi-Vis</div></div>
    <div class="meta"><div class="hex">#F26B1F</div><div class="role">Primary CTA, brand</div></div>
  </div>
  <div class="col">
    <div class="swatch" style="background: var(--ink)"><div class="name on-dark">Ink</div></div>
    <div class="meta"><div class="hex">#0E1A2B</div><div class="role">Text, dark surface</div></div>
  </div>
  <div class="col">
    <div class="swatch" style="background: var(--kraft)"><div class="name on-light">Kraft</div></div>
    <div class="meta"><div class="hex">#F4EAD5</div><div class="role">App background</div></div>
  </div>
  <div class="col">
    <div class="swatch" style="background: #fff; border-bottom: 1px solid var(--ink-10)"><div class="name on-light">Paper</div></div>
    <div class="meta"><div class="hex">#FFFFFF</div><div class="role">Card surface</div></div>
  </div>
</body></html>
