<!doctype html>
<html><head><meta charset="utf-8"><title>Slate scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; min-height: 150px; }
  .row { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--ink-10); }
  .step { flex: 1; height: 80px; display: flex; flex-direction: column; justify-content: space-between; padding: 8px 10px; }
  .num { font-family: var(--font-display); font-weight: 700; font-size: 14px; }
  .hex { font-family: var(--font-mono); font-size: 10px; }
  .light { color: var(--ink); } .dark { color: var(--kraft); }
  h4 { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-60); margin: 0 0 12px; font-weight: 600;}
</style></head>
<body>
  <h4>Slate scale</h4>
  <div class="row">
    <div class="step" style="background:var(--slate-50)"><span class="num light">50</span><span class="hex light">F7F8FA</span></div>
    <div class="step" style="background:var(--slate-100)"><span class="num light">100</span><span class="hex light">EEF1F4</span></div>
    <div class="step" style="background:var(--slate-200)"><span class="num light">200</span><span class="hex light">DDE2E8</span></div>
    <div class="step" style="background:var(--slate-300)"><span class="num light">300</span><span class="hex light">C2CAD3</span></div>
    <div class="step" style="background:var(--slate-400)"><span class="num light">400</span><span class="hex light">93A0AE</span></div>
    <div class="step" style="background:var(--slate-500)"><span class="num dark">500</span><span class="hex dark">677584</span></div>
    <div class="step" style="background:var(--slate-600)"><span class="num dark">600</span><span class="hex dark">4A5664</span></div>
    <div class="step" style="background:var(--slate-700)"><span class="num dark">700</span><span class="hex dark">333D4A</span></div>
    <div class="step" style="background:var(--slate-800)"><span class="num dark">800</span><span class="hex dark">1F2731</span></div>
    <div class="step" style="background:var(--slate-900)"><span class="num dark">900</span><span class="hex dark">0E1A2B</span></div>
  </div>
</body></html>
