<!doctype html>
<html><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; min-height: 150px; }
  .specimen { font-family: var(--font-display); font-weight: 700; font-size: 56px; line-height: 1; color: var(--ink); letter-spacing: -0.01em; }
  .row { display: flex; align-items: baseline; gap: 16px; margin-top: 14px; }
  .label { font-family: var(--font-body); font-size: 11px; color: var(--ink-60); letter-spacing: 0.04em; text-transform: uppercase; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-60); }
</style></head>
<body>
  <div class="label">Display — Archivo Narrow / 700</div>
  <div class="specimen">Book a plumber.</div>
  <div class="row">
    <span class="meta">44 / 56 / 64px · -0.01em · tabular nums for prices</span>
  </div>
</body></html>
