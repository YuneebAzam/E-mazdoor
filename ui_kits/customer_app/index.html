<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>E-Mazdoor — Customer App</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<style>
  body { margin: 0; min-height: 100vh; background: #1F2731; display: flex; align-items: center; justify-content: center; padding: 32px 0; font-family: var(--font-body); }
  .stage { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
  .frame-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .frame-label { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(244,234,213,0.55); }
  /* override to ensure scroll inside iOS frame screen area */
  .ios-screen-content { display: flex; flex-direction: column; }
</style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root" class="stage"></div>
<script type="text/babel">
// ===== ios-frame.jsx =====

function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});
</script>
<script type="text/babel">
// ===== components.jsx =====
/* global React, lucide */
const { useState: _useState, useEffect: _useEffect, useRef: _useRef } = React;

function Icon({ name, size = 20, stroke = 1.75, color }) {
  const ref = _useRef(null);
  _useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const node = document.createElement('i');
      node.setAttribute('data-lucide', name);
      ref.current.appendChild(node);
      window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': stroke } });
    }
  }, [name, size, stroke]);
  return <span ref={ref} style={{ display: 'inline-flex', color: color || 'currentColor' }} />;
}

function Header({ title, subtitle, onBack, right, greet, name }) {
  return (
    <header className="em-header">
      {onBack ? (
        <button className="back" onClick={onBack}><Icon name="chevron-left" size={22} /></button>
      ) : null}
      <div style={{ flex: 1, minWidth: 0 }}>
        {greet ? <div className="greet">{greet}</div> : null}
        {name ? <div className="name">{name}</div> : null}
        {title ? <div className="title">{title}</div> : null}
        {subtitle ? <div className="greet">{subtitle}</div> : null}
      </div>
      {right}
    </header>
  );
}

function Search({ value, onChange, placeholder }) {
  return (
    <div className="em-search">
      <span className="icon"><Icon name="search" size={18} /></span>
      <input value={value} onChange={(e) => onChange?.(e.target.value)} placeholder={placeholder || 'Search plumber, electrician…'} />
      <span className="icon"><Icon name="sliders-horizontal" size={18} /></span>
    </div>
  );
}

const SERVICES = [
  { id: 'plumber', name: 'Plumber', icon: 'wrench', from: 600 },
  { id: 'electric', name: 'Electrician', icon: 'plug-zap', from: 800, urgent: true },
  { id: 'carpenter', name: 'Carpenter', icon: 'hammer', from: 1000 },
  { id: 'painter', name: 'Painter', icon: 'paint-roller', from: 1500 },
  { id: 'ac', name: 'AC tech', icon: 'air-vent', from: 1200 },
  { id: 'mazdoor', name: 'Mazdoor', icon: 'hard-hat', from: 500 },
  { id: 'cleaner', name: 'Cleaner', icon: 'spray-can', from: 700 },
  { id: 'more', name: 'More', icon: 'grid-2x2', from: 0 },
];

function ServiceGrid({ selected, onSelect }) {
  return (
    <div className="em-services">
      {SERVICES.map((s) => (
        <button
          key={s.id}
          className={'em-tile' + (selected === s.id ? ' selected' : '')}
          onClick={() => onSelect?.(s.id)}
        >
          {s.urgent ? <span className="urgent">Urgent</span> : null}
          <span className="ic"><Icon name={s.icon} size={20} /></span>
          <span className="name">{s.name}</span>
        </button>
      ))}
    </div>
  );
}

const WORKERS = [
  { id: 'imran', name: 'Imran K.', initials: 'IK', trade: 'Plumber', years: 4, rating: 4.8, distance: 2.4, price: 800, status: 'Available now', verified: true, available: true },
  { id: 'rashid', name: 'Rashid A.', initials: 'RA', trade: 'Electrician', years: 7, rating: 4.9, distance: 1.1, price: 1200, status: 'Back at 5 pm', verified: true, available: false },
  { id: 'kashif', name: 'Kashif M.', initials: 'KM', trade: 'Plumber', years: 2, rating: 4.5, distance: 3.8, price: 650, status: 'Available now', verified: false, available: true },
  { id: 'salman', name: 'Salman P.', initials: 'SP', trade: 'Carpenter', years: 9, rating: 4.7, distance: 4.5, price: 1400, status: 'Available now', verified: true, available: true },
  { id: 'nasir', name: 'Nasir L.', initials: 'NL', trade: 'Painter', years: 5, rating: 4.4, distance: 3.1, price: 1500, status: 'Available now', verified: true, available: true },
  { id: 'hamza', name: 'Hamza I.', initials: 'HI', trade: 'AC tech', years: 3, rating: 4.6, distance: 2.0, price: 1200, status: 'Available now', verified: true, available: true },
  { id: 'zubair', name: 'Zubair F.', initials: 'ZF', trade: 'Mazdoor', years: 6, rating: 4.7, distance: 1.8, price: 500, status: 'Available now', verified: true, available: true },
  { id: 'rafiq', name: 'Rafiq S.', initials: 'RS', trade: 'Cleaner', years: 4, rating: 4.5, distance: 2.6, price: 700, status: 'Available now', verified: false, available: true },
  { id: 'bilal', name: 'Bilal K.', initials: 'BK', trade: 'Electrician', years: 5, rating: 4.7, distance: 2.9, price: 1100, status: 'Available now', verified: true, available: true },
  { id: 'faisal', name: 'Faisal R.', initials: 'FR', trade: 'Carpenter', years: 4, rating: 4.5, distance: 3.5, price: 1200, status: 'Available now', verified: true, available: true },
];

const SERVICE_TRADE = {
  plumber: 'Plumber',
  electric: 'Electrician',
  carpenter: 'Carpenter',
  painter: 'Painter',
  ac: 'AC tech',
  mazdoor: 'Mazdoor',
  cleaner: 'Cleaner',
};

function WorkerCard({ w, onClick }) {
  return (
    <div className="em-worker" onClick={() => onClick?.(w)}>
      <div className={'stripe ' + (w.available ? 'available' : 'busy')} />
      <div className="av" style={!w.available ? { background: 'var(--slate-400)' } : {}}>{w.initials}</div>
      <div className="meta">
        <div className="name">
          {w.name}
          {w.verified ? <span className="verified-tag">Verified</span> : null}
        </div>
        <div className="trade">{w.trade} · {w.years} yrs</div>
        <div className="row">
          <span className="star">★ {w.rating}</span>
          <span>· {w.distance} km</span>
          <span style={!w.available ? { color: 'var(--slate-500)', fontStyle: 'italic' } : {}}>· {w.status}</span>
        </div>
      </div>
      <div className="price"><span className="rs">Rs</span>{w.price.toLocaleString()}</div>
    </div>
  );
}

function TabBar({ active, onChange }) {
  const tabs = [
    { id: 'home', icon: 'home', label: 'Home' },
    { id: 'bookings', icon: 'calendar-clock', label: 'Bookings' },
    { id: 'messages', icon: 'message-circle', label: 'Messages' },
    { id: 'profile', icon: 'user', label: 'Profile' },
  ];
  return (
    <nav className="em-tabbar">
      {tabs.map((t) => (
        <button key={t.id} className={'em-tab' + (active === t.id ? ' active' : '')} onClick={() => onChange?.(t.id)}>
          <span className="ic"><Icon name={t.icon} size={22} /></span>
          <span>{t.label}</span>
        </button>
      ))}
    </nav>
  );
}

function Stamp({ children, color = 'ink' }) {
  const cls = 'em-stamp' + (color !== 'ink' ? ' ' + color : '');
  return <div className={cls}>{children}</div>;
}

function Chips({ items, value, onChange }) {
  return (

<script type="text/babel">
  const { useState } = React;

  function Phone({ label, children }) {
    return (
      <div className="frame-wrap">
        <IOSDevice width={390} height={780}>
          {children}
        </IOSDevice>
        <div className="frame-label">{label}</div>
      </div>
    );
  }

  function CustomerFlow() {
    const [stack, setStack] = useState([{ name: 'home' }]);
    const [tab, setTab] = useState('home');
    const route = stack[stack.length - 1];

    const push = (r) => setStack(s => [...s, r]);
    const pop = () => setStack(s => s.length > 1 ? s.slice(0, -1) : s);
    const reset = (r) => setStack([r]);

    const goService = (id) => push({ name: 'list', service: id });
    const goWorker = (w) => push({ name: 'worker', worker: w });
    const goPay = (w, slot, issue) => push({ name: 'pay', worker: w, slot, issue });
    const goConfirm = () => push({ name: 'confirm', worker: route.worker });
    const goHome = () => { reset({ name: 'home' }); setTab('home'); };
    const onTab = (t) => {
      setTab(t);
      if (t === 'home') reset({ name: 'home' });
      if (t === 'bookings') reset({ name: 'bookings' });
    };

    if (route.name === 'home') return <HomeScreen tab={tab} onTab={onTab} onPickService={goService} onPickWorker={goWorker} />;
    if (route.name === 'list') return <ServiceListScreen tab={tab} onTab={onTab} service={route.service} onPickWorker={goWorker} onBack={pop} />;
    if (route.name === 'worker') return <WorkerDetailScreen worker={route.worker} onBack={pop} onBook={goPay} />;
    if (route.name === 'pay') return <PaymentScreen worker={route.worker} slot={route.slot} issue={route.issue} onBack={pop} onConfirm={goConfirm} />;
    if (route.name === 'confirm') return <ConfirmScreen worker={route.worker} onBack={goHome} onDone={() => { reset({ name: 'bookings' }); setTab('bookings'); }} />;
    if (route.name === 'bookings') return <BookingsScreen tab={tab} onTab={onTab} onBack={goHome} />;
    return null;
  }

  // Wrap a single screen so its onBack pops the navigation stack.
  function Standalone({ initial }) {
    const [stack, setStack] = useState([initial]);
    const view = stack[stack.length - 1];
    const push = (v) => setStack(s => [...s, v]);
    const back = () => setStack(s => s.length > 1 ? s.slice(0, -1) : [{ name: 'home' }]);
    if (view.name === 'home') return <HomeScreen tab="home" onTab={()=>{}} onPickService={(id)=>push({name:'list', service:id})} onPickWorker={(w)=>push({name:'worker', worker:w})} />;
    if (view.name === 'list') return <ServiceListScreen tab="home" onTab={()=>{}} service={view.service} onPickWorker={(w)=>push({name:'worker', worker:w})} onBack={back} />;
    if (view.name === 'worker') return <WorkerDetailScreen worker={view.worker} onBack={back} onBook={(w,slot,issue)=>push({name:'pay', worker:w, slot, issue})} />;
    if (view.name === 'pay') return <PaymentScreen worker={view.worker} slot={view.slot} issue={view.issue} onBack={back} onConfirm={()=>push({name:'confirm', worker:view.worker})} />;
    if (view.name === 'confirm') return <ConfirmScreen worker={view.worker} onBack={back} onDone={back} />;
    if (view.name === 'bookings') return <BookingsScreen tab="bookings" onTab={()=>{}} onBack={back} />;
    if (view.name === 'rate') return <RatingScreen worker={view.worker} onBack={back} onSubmit={back} />;
    return null;
  }

  function App() {
    return (
      <>
        <Phone label="01 · Home"><Standalone initial={{ name: 'home' }} /></Phone>
        <Phone label="02 · Pro detail"><Standalone initial={{ name: 'worker', worker: WORKERS[0] }} /></Phone>
        <Phone label="03 · Payment"><Standalone initial={{ name: 'pay', worker: WORKERS[0], slot: 'Today 4 pm', issue: 'Sink leak' }} /></Phone>
        <Phone label="04 · Confirmation"><Standalone initial={{ name: 'confirm', worker: WORKERS[0] }} /></Phone>
        <Phone label="05 · Bookings"><Standalone initial={{ name: 'bookings' }} /></Phone>
        <Phone label="06 · Rate"><Standalone initial={{ name: 'rate', worker: WORKERS[0] }} /></Phone>
        <Phone label="↻ Click-thru flow"><CustomerFlow /></Phone>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
